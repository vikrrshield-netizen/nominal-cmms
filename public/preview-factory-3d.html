<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIKRR | Provoz 360 — vizualizace provozu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #f0f4f8;
      --neon-green: #10b981;
      --neon-blue: #0ea5e9;
      --neon-red: #ef4444;
      --text-main: #0f172a;
      --text-muted: #475569;
      --glass-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      overflow: hidden; position: relative; padding: 20px;
    }
    .bg-grid {
      position: absolute; inset: 0; z-index: 1; background-size: 40px 40px;
      background-image:
        linear-gradient(to right, rgba(15, 23, 42, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(15, 23, 42, 0.03) 1px, transparent 1px);
      pointer-events: none;
    }
    .header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 40px; height: 40px; border-radius: 14px;
      background: linear-gradient(135deg, #0ea5e9 0%, #10b981 100%);
      border: 1px solid rgba(255, 255, 255, 0.2); color: #fff;
      display: grid; place-items: center; font-weight: 900; font-size: 1.3rem;
      box-shadow: 0 8px 25px rgba(14, 165, 233, 0.25);
    }
    .title {
      font-weight: 900; font-size: 1.35rem; letter-spacing: -0.02em;
      background: linear-gradient(to right, #0ea5e9, #10b981);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
    .viewport-container {
      width: 100%; max-width: 1200px; height: 65vh;
      border: 1px solid rgba(15, 23, 42, 0.06); border-radius: 24px;
      position: relative; z-index: 5; overflow: hidden; background: #eef1f5;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.18), inset 0 1px 0 rgba(255,255,255,0.5);
    }
    .hero-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    /* jemné svícení nad Wi-Fi v obrázku */
    .wifi-glow {
      position: absolute; left: 41%; top: 56%; width: 90px; height: 90px;
      transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 8;
      background: radial-gradient(circle, rgba(56,189,248,0.45), transparent 65%);
      animation: wifiPulse 2.2s ease-in-out infinite;
    }
    @keyframes wifiPulse { 0%,100% { opacity: 0.25; transform: translate(-50%,-50%) scale(0.9); } 50% { opacity: 0.7; transform: translate(-50%,-50%) scale(1.15); } }
    .glass-widget {
      position: absolute; right: 24px; top: 24px; width: 280px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 20px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.10); z-index: 20; pointer-events: none;
      transition: border-color 0.5s ease, box-shadow 0.5s ease;
    }
    .glass-widget.critical { border-color: rgba(220,38,38,0.3); box-shadow: 0 20px 40px rgba(220,38,38,0.12), 0 0 30px rgba(220,38,38,0.05); }
    .widget-header { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background-color: var(--neon-green); animation: pulseGreen 1.8s infinite; }
    .pulse-dot.red { background-color: var(--neon-red); animation: pulseRed 1.8s infinite; }
    .widget-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 16px; margin-bottom: 16px; }
    .widget-stat { display: flex; flex-direction: column; }
    .stat-val { font-size: 1.6rem; font-weight: 900; font-family: 'JetBrains Mono', monospace; color: var(--text-main); }
    .stat-val.green { color: var(--neon-green); }
    .stat-val.red { color: var(--neon-red); }
    .stat-label { font-size: 0.68rem; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .mini-chart { width: 100%; height: 40px; fill: none; stroke: var(--neon-blue); stroke-width: 2.2; stroke-linecap: round; filter: drop-shadow(0 0 2px rgba(37,99,235,0.15)); }
    .mini-chart.red { stroke: var(--neon-red); filter: drop-shadow(0 0 2px rgba(220,38,38,0.15)); }
    #chartPath { stroke-dasharray: 320; stroke-dashoffset: 0; animation: chartFlow 6s linear infinite; }
    @keyframes chartFlow { to { stroke-dashoffset: -320; } }
    @keyframes pulseGreen { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.25); opacity: 0.7; } }
    @keyframes pulseRed { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.25); opacity: 0.7; } }
    .controls-panel { width: 100%; max-width: 1200px; display: flex; gap: 16px; z-index: 10; flex-wrap: wrap; }
    .btn-ctrl { background: #fff; border: 1px solid rgba(15,23,42,0.1); color: var(--text-main); padding: 14px 28px; border-radius: 14px; cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: all 0.2s; box-shadow: 0 4px 12px rgba(15,23,42,0.06); }
    .btn-ctrl:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(15,23,42,0.1); }
    .btn-ctrl:active { transform: translateY(1px); }
    .btn-ctrl.red { background: rgba(239,68,68,0.06); border-color: rgba(239,68,68,0.25); color: var(--neon-red); }
    .btn-ctrl.red:hover { background: rgba(239,68,68,0.1); }
    .btn-ctrl.green { background: rgba(16,185,129,0.06); border-color: rgba(16,185,129,0.25); color: var(--neon-green); }
    .btn-ctrl.green:hover { background: rgba(16,185,129,0.1); }
    .btn-ctrl:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }
    .tips { font-size: 0.78rem; color: var(--text-muted); text-align: center; line-height: 1.6; z-index: 10; }
    @media (max-width: 640px) { .glass-widget { right: 12px; top: 12px; width: 200px; padding: 14px; } .viewport-container { height: 52vh; } .btn-ctrl { flex: 1; padding: 12px; } }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <header class="header">
    <div class="brand">
      <div class="logo">V</div>
      <div>
        <h1 class="title">VIKRR Provoz 360</h1>
        <p class="subtitle">Vizualizace provozu v reálném čase</p>
      </div>
    </div>
  </header>

  <div class="viewport-container" id="viewport">
    <img class="hero-img" src="provoz360-hero.png" alt="Provoz 360 — výroba, kancelář a údržba">
    <div class="wifi-glow"></div>

    <div class="glass-widget" id="widget">
      <div class="widget-header">
        <span class="pulse-dot" id="widgetDot"></span>
        Provoz 360 · živě
      </div>
      <div class="widget-grid">
        <div class="widget-stat">
          <span class="stat-val green" id="statTasks">34</span>
          <span class="stat-label">úkoly</span>
        </div>
        <div class="widget-stat">
          <span class="stat-val" id="statTemp">55°C</span>
          <span class="stat-label">extruder</span>
        </div>
      </div>
      <svg class="mini-chart" id="chart" viewBox="0 0 210 40">
        <path d="M 5,25 L 30,22 L 55,28 L 80,18 L 105,25 L 130,12 L 155,20 L 180,8 L 205,15" id="chartPath" />
      </svg>
    </div>
  </div>

  <div class="controls-panel">
    <button class="btn-ctrl red" id="btnTriggerFault">Simulovat poruchu extruderu</button>
    <button class="btn-ctrl green" id="btnResolveFault" disabled>Vyřešit incident (Technik)</button>
    <button class="btn-ctrl" id="btnSendTruck">Příjem materiálu (Kamion)</button>
  </div>

  <div class="tips">
    Provoz 360 — od stroje po doklad, živě. Vyzkoušejte tlačítka: simulujte poruchu a její vyřešení.
  </div>

  <script>
    (function () {
      var statTemp = document.getElementById('statTemp');
      var statTasks = document.getElementById('statTasks');
      var widget = document.getElementById('widget');
      var dot = document.getElementById('widgetDot');
      var chart = document.getElementById('chart');
      var btnFault = document.getElementById('btnTriggerFault');
      var btnResolve = document.getElementById('btnResolveFault');
      var btnTruck = document.getElementById('btnSendTruck');
      var temps = [54, 55, 56, 55, 57, 56, 54];
      var ti = 0, critical = false;

      setInterval(function () {
        if (critical) { statTemp.textContent = (77 + Math.round(Math.random() * 4)) + '°C'; }
        else { ti = (ti + 1) % temps.length; statTemp.textContent = temps[ti] + '°C'; }
      }, 1700);

      btnFault.addEventListener('click', function () {
        critical = true;
        widget.classList.add('critical');
        dot.classList.add('red');
        chart.classList.add('red');
        statTemp.classList.add('red');
        statTasks.classList.remove('green'); statTasks.classList.add('red');
        btnFault.disabled = true; btnResolve.disabled = false;
      });

      btnResolve.addEventListener('click', function () {
        critical = false;
        widget.classList.remove('critical');
        dot.classList.remove('red');
        chart.classList.remove('red');
        statTemp.classList.remove('red');
        statTasks.classList.remove('red'); statTasks.classList.add('green');
        btnResolve.disabled = true; btnFault.disabled = false;
      });

      btnTruck.addEventListener('click', function () {
        var n = parseInt(statTasks.textContent, 10) || 34;
        statTasks.textContent = (n + 1);
        btnTruck.disabled = true;
        setTimeout(function () { btnTruck.disabled = false; }, 2500);
      });
    })();
  </script>
</body>
</html>
